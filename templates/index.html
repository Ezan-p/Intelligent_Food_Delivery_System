<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>外卖客户端 - 智能外卖管理平台</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header>
        <h1>外卖客户端</h1>
        <p>欢迎来到智能外卖平台，快速点餐，查看订单状态。</p>
        <nav class="page-nav">
            <a class="nav-link active" href="{{ customer_url }}">客户端</a>
            <a class="nav-link" href="{{ merchant_url }}">商家端</a>
            <a class="nav-link" href="{{ admin_url }}">后台管理端</a>
            <a class="nav-link" href="{{ chat_url }}">AI客服</a>
            <div id="userNav" style="margin-left: auto;">
                <a id="loginLink" class="nav-link" href="/login">客户端登录</a>
                <span id="userInfo" style="display: none; color: #e2e8f0; padding: 8px 16px;">
                    欢迎, <span id="username"></span>
                    <button id="logoutBtn" class="nav-link" style="background: none; border: none; padding: 0; margin-left: 12px;">退出</button>
                </span>
            </div>
        </nav>
    </header>

    <div class="container-with-sidebar">
        <!-- 侧边菜单 -->
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <button class="menu-item active" data-page="stores">
                    <span class="icon">🏪</span>
                    <span>店铺列表</span>
                </button>
                <button class="menu-item" data-page="services">
                    <span class="icon">🤖</span>
                    <span>智能服务</span>
                </button>
                <button class="menu-item" data-page="cart">
                    <span class="icon">🛒</span>
                    <span>购物车</span>
                </button>
                <button class="menu-item" data-page="addresses" id="addressMenuBtn" style="display: none;">
                    <span class="icon">📍</span>
                    <span>我的地址</span>
                </button>
                <button class="menu-item" data-page="orders">
                    <span class="icon">📋</span>
                    <span>订单查询</span>
                </button>
                <button class="menu-item" data-page="history">
                    <span class="icon">📜</span>
                    <span>历史订单</span>
                </button>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <section class="page active" id="page-stores">
                <h2>商家店铺</h2>
                <p class="analysis-summary">先选择一家店铺，再查看该店铺下的菜品和套餐。</p>
                <div class="search-toolbar">
                    <input type="search" id="storeSearchInput" placeholder="搜索店铺名称、简介、公告" />
                </div>
                <div id="storeList" class="service-grid"></div>
            </section>

            <section class="page" id="page-store-detail">
                <div class="section-header-row">
                    <div>
                        <h2>店铺详情</h2>
                        <div id="selectedStoreBanner" class="analysis-summary">尚未选择店铺。</div>
                    </div>
                    <button id="backToStoresBtn" class="secondary">返回店铺列表</button>
                </div>
                <div class="store-detail-tabs">
                    <button class="filter-btn active store-detail-tab" data-store-tab="menu">菜品</button>
                    <button class="filter-btn store-detail-tab" data-store-tab="combos">套餐</button>
                </div>

                <div class="store-detail-panel active" id="store-tab-menu">
                    <div class="search-toolbar">
                        <input type="search" id="menuSearchInput" placeholder="搜索当前店铺内的菜品名称、描述" />
                    </div>
                    <div class="category-filter">
                        <button class="filter-btn active" data-category="all">全部</button>
                    </div>
                    <div id="menuList" class="menu-grid"></div>
                </div>

                <div class="store-detail-panel" id="store-tab-combos">
                    <div id="selectedComboStoreBanner" class="analysis-summary">尚未选择店铺。</div>
                    <div id="comboList" class="combo-grid"></div>
                </div>
            </section>

            <section class="page" id="page-services">
                <h2>智能服务</h2>
                <div class="service-grid">
                    <a class="service-card-link" href="{{ customer_chat_url }}">
                        <article class="service-card">
                            <span class="service-tag">AI客服</span>
                            <h3>AI客服助手</h3>
                            <p>咨询订单、退款、配送、地址、活动等平台问题。</p>
                            <span class="service-entry">进入服务</span>
                        </article>
                    </a>
                    <a class="service-card-link" href="{{ customer_order_assistant_url }}">
                        <article class="service-card">
                            <span class="service-tag">智能推荐</span>
                            <h3>智能点餐助手</h3>
                            <p>根据预算、人数和口味偏好，快速生成点餐建议。</p>
                            <span class="service-entry">开始推荐</span>
                        </article>
                    </a>
                </div>
            </section>

            <!-- 购物车页面 -->
            <section class="page" id="page-cart">
                <h2>购物车</h2>
                <div class="cart-panel">
                    <div id="cartStoreBanner" class="analysis-summary">请选择店铺后再加购。</div>
                    <div id="cartItems"></div>
                    <div class="cart-total">总价: ¥<span id="cartTotal">0.00</span></div>
                </div>
                <div class="order-info">
                    <h3>提交订单</h3>
                    <div class="form-group">
                        <label>姓名
                            <input type="text" id="customerName" placeholder="请输入姓名" />
                        </label>
                    </div>
                    <button id="submitOrder" class="primary">确认下单</button>
                </div>
            </section>

            <!-- 我的地址页面 -->
            <section class="page" id="page-addresses">
                <h2>收货地址</h2>
                <div class="address-form">
                    <h3>添加新地址</h3>
                    <div class="form-group">
                        <label>收货人名称
                            <input type="text" id="addressName" placeholder="收货人名称" />
                        </label>
                    </div>
                    <div class="form-group">
                        <label>详细地址
                            <input type="text" id="addressDetail" placeholder="详细地址" />
                        </label>
                    </div>
                    <div class="form-group">
                        <label>电话号码
                            <input type="tel" id="addressPhone" placeholder="电话号码" />
                        </label>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isDefault" /> 设为默认地址
                        </label>
                    </div>
                    <button id="addAddressBtn" class="primary">添加地址</button>
                </div>
                <div class="address-list">
                    <h3>我的地址</h3>
                    <div id="addressList"></div>
                </div>
            </section>

            <!-- 订单查询页面 -->
            <section class="page" id="page-orders">
                <h2>当前订单</h2>
                <div id="orderList"></div>
            </section>

            <!-- 历史订单页面 -->
            <section class="page" id="page-history">
                <h2>历史订单</h2>
                <div class="history-form">
                    <label>查询姓名
                        <input type="text" id="historyCustomer" placeholder="请输入姓名查询历史订单" />
                    </label>
                    <button id="searchHistory" class="primary">查询</button>
                </div>
                <div id="historyList"></div>
            </section>
        </main>
    </div>

    <a class="ai-chat-entry" href="{{ customer_chat_url }}" aria-label="打开AI客服">
        💬 AI 客服
    </a>

    <script src="/static/app.js"></script>
</body>
</html>
